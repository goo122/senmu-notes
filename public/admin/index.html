<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>写文章 · 森木笔记</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #fffdf9;
      }
      .boot {
        max-width: 420px;
        margin: 15vh auto;
        padding: 1.5rem;
        color: #57534e;
        text-align: center;
        line-height: 1.6;
      }
      .boot h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
        color: #1c1917;
      }
      .boot code {
        background: #fff7ed;
        padding: 0.1em 0.4em;
        border-radius: 4px;
        font-size: 0.9em;
      }
    </style>
    <script src="https://unpkg.com/decap-cms@^3.3.3/dist/decap-cms.js"></script>
  </head>
  <body>
    <div class="boot" id="boot">
      <h1>正在加载编辑后台…</h1>
      <p>
        若长时间空白，请先在项目目录运行：
        <br />
        <code>npm run write</code>
      </p>
      <p>然后打开本页（需与博客同一端口）。</p>
    </div>
    <script>
      // 后台加载后隐藏提示
      const hide = () => {
        const el = document.getElementById("boot");
        if (el) el.style.display = "none";
      };
      const obs = new MutationObserver(() => {
        if (document.getElementById("nc-root") || document.querySelector("[class*='App']")) {
          hide();
          obs.disconnect();
        }
      });
      obs.observe(document.body, { childList: true, subtree: true });
      setTimeout(hide, 8000);
    </script>
  </body>
</html>
