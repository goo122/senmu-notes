# 本地发文：npm run write 后打开 http://127.0.0.1:端口/admin
local_backend: true

backend:
  name: git-gateway
  branch: feature/personal-blog

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: posts
    label: Posts
    label_singular: Post
    folder: src/content/posts
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - label: Publish Date
        name: pubDate
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
      - label: Updated Date
        name: updatedDate
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
        required: false
      - label: Category
        name: category
        widget: select
        options:
          - { label: tech, value: tech }
          - { label: life, value: life }
          - { label: notes, value: notes }
          - { label: other, value: other }
        default: notes
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false, required: false }
      - { label: Hero Image, name: heroImage, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }
